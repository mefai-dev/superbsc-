  <!-- Inline fallback: ensures globals are available before modules load -->
  <script>
    window.mefaiTable = window.mefaiTable || {
      renderTable: function(cols, rows, opts) {
        opts = opts || {};
        var ths = cols.map(function(c) {
          var s = opts.sortKey === c.key;
          var cls = s ? 'sorted ' + (opts.sortDir === 'asc' ? 'asc' : '') : '';
          return '<th data-key="'+c.key+'" class="'+cls+'" style="'+(c.width?'width:'+c.width:'')+'">' + c.label + '</th>';
        }).join('');
        var trs = rows.map(function(row, i) {
          var tds = cols.map(function(c) {
            var v = c.render ? c.render(row[c.key], row) : (row[c.key] != null ? row[c.key] : '—');
            var a = c.align === 'right' ? 'text-align:right' : '';
            return '<td style="'+a+'" data-key="'+c.key+'">'+v+'</td>';
          }).join('');
          return '<tr data-index="'+i+'">'+tds+'</tr>';
        }).join('');
        return '<table class="data-table"><thead><tr>'+ths+'</tr></thead><tbody>'+trs+'</tbody></table>';
      },
      bindTableEvents: function(container, cols, rows, opts) {
        opts = opts || {};
        var table = container.querySelector('.data-table');
        if (!table) return;
        if (opts.onSort) table.querySelectorAll('th').forEach(function(th) { th.addEventListener('click', function() { opts.onSort(th.dataset.key); }); });
        if (opts.onRowClick) table.querySelectorAll('tbody tr').forEach(function(tr) { tr.addEventListener('click', function() { var idx = parseInt(tr.dataset.index); if (rows[idx]) opts.onRowClick(rows[idx]); }); });
      },
      sortRows: function(rows, key, dir) {
        dir = dir || 'desc';
        return rows.slice().sort(function(a, b) {
          var va = a[key], vb = b[key];
          if (typeof va === 'string') va = va.toLowerCase();
          if (typeof vb === 'string') vb = vb.toLowerCase();
          var na = Number(va), nb = Number(vb);
          if (!isNaN(na) && !isNaN(nb)) { va = na; vb = nb; }
          if (va < vb) return dir === 'asc' ? -1 : 1;
          if (va > vb) return dir === 'asc' ? 1 : -1;
          return 0;
        });
      }
    };
    window.mefaiUtils = window.mefaiUtils || {};
    if (!window.mefaiUtils.tokenIcon) {
      window.mefaiUtils.tokenIcon = function(p) {
        if (!p || typeof p !== 'string') return '';
        if (p.startsWith('https://')) return p;
        if (p.startsWith('http://')) return p.replace('http://','https://');
        return 'https://bin.bnbstatic.com' + (p.startsWith('/') ? '' : '/') + p;
      };
    }
    if (!window.mefaiUtils.escapeHtml) {
      window.mefaiUtils.escapeHtml = function(s) {
        var d = document.createElement('div'); d.textContent = s; return d.innerHTML;
      };
    }
    if (!window.mefaiUtils.formatPrice) {
      window.mefaiUtils.formatPrice = function(n) {
        n = Number(n); if (isNaN(n)) return '—';
        if (n >= 1) return n.toFixed(2);
        if (n >= 0.01) return n.toFixed(4);
        if (n >= 0.0001) return n.toFixed(6);
        return n.toFixed(8);
      };
    }
    if (!window.mefaiUtils.formatCurrency) {
      window.mefaiUtils.formatCurrency = function(n) {
        n = Number(n); if (isNaN(n)) return '—';
        if (Math.abs(n) >= 1e9) return '$'+(n/1e9).toFixed(2)+'B';
        if (Math.abs(n) >= 1e6) return '$'+(n/1e6).toFixed(2)+'M';
        if (Math.abs(n) >= 1e3) return '$'+(n/1e3).toFixed(2)+'K';
        return '$'+n.toFixed(2);
      };
    }
    if (!window.mefaiUtils.formatPercent) {
      window.mefaiUtils.formatPercent = function(n) {
        n = Number(n); if (isNaN(n)) return '—';
        var cls = n >= 0 ? 'val-up' : 'val-down';
        var a = n >= 0 ? '↑' : '↓';
        return '<span class="'+cls+'">'+a+Math.abs(n).toFixed(2)+'%</span>';
      };
    }
    if (!window.mefaiUtils.formatNumber) {
      window.mefaiUtils.formatNumber = function(n) {
        n = Number(n); if (isNaN(n)) return '—';
        if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(2)+'B';
        if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2)+'M';
        if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1)+'K';
        return n.toLocaleString();
      };
    }
    if (!window.mefaiUtils.formatAddress) {
      window.mefaiUtils.formatAddress = function(a) { return a ? a.slice(0,6)+'...'+a.slice(-4) : '—'; };
    }
    if (!window.mefaiUtils.formatTime) {
      window.mefaiUtils.formatTime = function(ts) {
        if (!ts) return '—';
        return new Date(typeof ts==='number' && ts<1e12 ? ts*1000 : ts).toLocaleTimeString('en-US',{hour12:false});
      };
    }
    if (!window.mefaiUtils.formatAge) {
      window.mefaiUtils.formatAge = function(ts) {
        if (!ts) return '—';
        var m = Math.floor((Date.now()-(typeof ts==='number'&&ts<1e12?ts*1000:ts))/60000);
        if (m<60) return m+'m'; var h=Math.floor(m/60);
        if (h<24) return h+'h'; return Math.floor(h/24)+'d';
      };
    }
    if (!window.mefaiUtils.copyToClipboard) {
      window.mefaiUtils.copyToClipboard = function(t) { navigator.clipboard.writeText(t).catch(function(){}); };
    }
    if (!window.mefaiUtils.debounce) {
      window.mefaiUtils.debounce = function(fn, ms) { var t; ms=ms||300; return function() { var a=arguments; clearTimeout(t); t=setTimeout(function(){fn.apply(null,a)},ms); }; };
    }
    if (!window.mefaiUtils.riskClass) {
      window.mefaiUtils.riskClass = function(l) {
        if (!l) return 'risk-low'; l=String(l).toLowerCase();
        if (l==='high'||l==='danger') return 'risk-high';
        if (l==='medium'||l==='med') return 'risk-medium';
        return 'risk-low';
      };
    }
  </script>
